name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 💡 编码习惯 - 按小时/星期统计 commit 活跃度
      # 使用修复了 null author bug 的 fork 版本
      - name: 💡 Habits
        uses: Br1an67/metrics@fix/habits-null-commit-author
        with:
          filename: metrics.plugin.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Br1an67
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          retries: 3
          retries_delay: 300
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_facts: yes
          plugin_habits_days: 365
          plugin_habits_from: 1000

  contributions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏆 Generate contributions card
        run: python3 .github/scripts/generate-contributions.py
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: Br1an67
          LIMIT: "10"
          OUTPUT: metrics.plugin.contributions.svg

      - name: 📤 Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.plugin.contributions.svg
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update contributions card [skip ci]" && git push)
